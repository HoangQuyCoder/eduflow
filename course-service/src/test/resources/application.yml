spring:
  application:
    name: course-service-test
  
  # Disable Config Server for tests
  cloud:
    config:
      enabled: false
  
  # Mock MongoDB for tests (if using Testcontainers or Fongo)
  data:
    mongodb:
      uri: mongodb://localhost:27017/course_db_test
  
  # Mock Redis
  redis:
    host: localhost
    port: 6379

  # Mock Kafka
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false # Disable Eureka for tests
