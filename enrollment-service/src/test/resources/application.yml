spring:
  application:
    name: enrollment-service-test
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:enrollment_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false
