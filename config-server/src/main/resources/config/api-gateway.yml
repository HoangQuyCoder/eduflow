spring:
  cloud:
    gateway:
      routes:
        - id: identity-auth
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthenticationFilter
        - id: course-service
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/v1/courses/**
          filters:
            - AuthenticationFilter
        - id: enrollment-service
          uri: lb://ENROLLMENT-SERVICE
          predicates:
            - Path=/api/v1/enrollments/**
            - Path=/api/v1/payments/**
            - Path=/api/v1/learning-progress/**
          filters:
            - AuthenticationFilter
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - AuthenticationFilter
        - id: identity-openapi
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/identity-service/v3/api-docs/**
          filters:
            - RewritePath=/identity-service/(?<segment>.*), /$\{segment}
        - id: course-openapi
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/course-service/v3/api-docs/**
          filters:
            - RewritePath=/course-service/(?<segment>.*), /$\{segment}
        - id: enrollment-openapi
          uri: lb://ENROLLMENT-SERVICE
          predicates:
            - Path=/enrollment-service/v3/api-docs/**
          filters:
            - RewritePath=/enrollment-service/(?<segment>.*), /$\{segment}
        - id: notification-openapi
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - RewritePath=/notification-service/(?<segment>.*), /$\{segment}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Identity Service
        url: /identity-service/v3/api-docs
      - name: Course Service
        url: /course-service/v3/api-docs
      - name: Enrollment Service
        url: /enrollment-service/v3/api-docs
      - name: Notification Service
        url: /notification-service/v3/api-docs

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
