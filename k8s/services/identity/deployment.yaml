apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: ghcr.io/${GITHUB_REPOSITORY}/identity-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: eduflow-config
              key: POSTGRES_IDENTITY_HOST
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: eduflow-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: eduflow-secrets
              key: POSTGRES_PASSWORD
        - name: EUREKA_HOST
          valueFrom:
            configMapKeyRef:
              name: eduflow-config
              key: EUREKA_HOST
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: eduflow-secrets
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 45
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
