apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eduflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/${GITHUB_REPOSITORY}/notification-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: eduflow-config
                  key: MONGODB_HOST
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: eduflow-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eduflow-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: eduflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: eduflow-config
                  key: EUREKA_HOST
            - name: EUREKA_PORT
              valueFrom:
                configMapKeyRef:
                  name: eduflow-config
                  key: EUREKA_PORT
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eduflow
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
